name: Staging CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_api:
        description: Deploy API to staging
        required: false
        type: boolean
        default: true
      deploy_admin:
        description: Deploy Admin to staging
        required: false
        type: boolean
        default: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.30.3'
  RAILWAY_ENVIRONMENT: staging
  RAILWAY_API_SERVICE: foodtrucks-api-staging
  RAILWAY_ADMIN_SERVICE: foodtrucks-admin-staging

concurrency:
  group: staging-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  deploy_api:
    name: Deploy API to Staging
    runs-on: ubuntu-latest
    needs: verify
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_api)
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: >
          railway up apps/api
          --service ${{ env.RAILWAY_API_SERVICE }}
          --environment ${{ env.RAILWAY_ENVIRONMENT }}
          --project $RAILWAY_PROJECT_ID
          --path-as-root
          --ci

  deploy_admin:
    name: Deploy Admin to Staging
    runs-on: ubuntu-latest
    needs: verify
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_admin)
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Admin
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: >
          railway up apps/admin
          --service ${{ env.RAILWAY_ADMIN_SERVICE }}
          --environment ${{ env.RAILWAY_ENVIRONMENT }}
          --project $RAILWAY_PROJECT_ID
          --path-as-root
          --ci
